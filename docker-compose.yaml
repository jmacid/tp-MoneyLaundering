services:
  gateway:
    build:
      context: ./src/
      dockerfile: gateway/Dockerfile
    container_name: gateway
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
    - INPUT_QUEUE=threshold_transactions_3
    - MOM_HOST=rabbitmq
    - OUTPUT_QUEUE=transactions
    - PYTHONUNBUFFERED=1
    - SERVER_HOST=gateway
    - SERVER_PORT=5678
    - EOF_CONTROL_QUEUE=eof_control_queue_3
  client_1:
    build:
      context: ./src/
      dockerfile: client/Dockerfile
    container_name: client_1
    depends_on:
      - gateway
    environment:
    - INPUT_FILE=/datasets/HI-Small_Trans.csv
    - SERVER_HOST=gateway
    - SERVER_PORT=5678
    - OUTPUT_FILE_MINOR_RESULT=/output/client_1_minor_result.csv
    volumes:
    - ./datasets:/datasets
    - ./output:/output
  rabbitmq:
    build:
      context: ./src/rabbitmq
      dockerfile: Dockerfile
    container_name: rabbitmq
    environment:
    - RABBITMQ_LOG_LEVELS=error
    healthcheck:
      interval: 5s
      retries: 10
      start_period: 50s
      test: rabbitmq-diagnostics check_port_connectivity
      timeout: 3s
    ports:
    - 5672:5672
    - 15672:15672
  projection_dispatcher_1:
    build:
      context: ./src/
      dockerfile: workers/worker/Dockerfile
    container_name: projection_dispatcher_1
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - RABBITMQ_HOST=rabbitmq
      - OPERATION_TYPE=projection_dispatcher
      - INPUT_MIDDLEWARE_TYPE=queue
      - INPUT_QUEUE=transactions
      - OUTPUTS=minor_query,max_query,avg_query,scatter_gather_query,count_query
      - EOF_CONTROL_QUEUE=eof_control_queue_3
  currency_filter_1:
    build:
      context: ./src/
      dockerfile: workers/worker/Dockerfile
    container_name: currency_filter_1
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - RABBITMQ_HOST=rabbitmq
      - OPERATION_TYPE=currency_filter
      - INPUT_MIDDLEWARE_TYPE=queue
      - INPUT_QUEUE=avg_query
      - OUTPUT_MIDDLEWARE_TYPE=broadcast
      - OUTPUTS=USD_transactions_3,USD_transactions_avg_3
      - CURRENCY=US Dollar
      - EOF_CONTROL_QUEUE=eof_control_queue_3
  date_range_filter_1:
    build:
      context: ./src/
      dockerfile: workers/worker/Dockerfile
    container_name: date_range_filter_1
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - RABBITMQ_HOST=rabbitmq
      - OPERATION_TYPE=date_range_filter
      - INPUT_MIDDLEWARE_TYPE=queue
      - INPUT_QUEUE=USD_transactions_3
      - OUTPUT_MIDDLEWARE_TYPE=queue
      - OUTPUTS=threshold_evaluation_3
      - START_DATE=2022-09-01T00:15:00
      - END_DATE=2022-09-01T00:30:00
      - EOF_CONTROL_QUEUE=eof_control_queue_3
  date_range_filter_avg_1:
    build:
      context: ./src/
      dockerfile: workers/worker/Dockerfile
    container_name: date_range_filter_avg_1
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - RABBITMQ_HOST=rabbitmq
      - OPERATION_TYPE=date_range_filter
      - INPUT_MIDDLEWARE_TYPE=queue
      - INPUT_QUEUE=USD_transactions_avg_3
      - OUTPUT_MIDDLEWARE_TYPE=queue
      - OUTPUTS=avg_transactions_3
      - START_DATE=2022-09-01T00:15:00
      - END_DATE=2022-09-01T00:30:00
      - EOF_CONTROL_QUEUE=eof_control_queue_3
  average_worker_1:
    build:
      context: ./src
      dockerfile: operations/average/Dockerfile
    container_name: average_worker_1
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - RABBITMQ_HOST=rabbitmq
      - INPUT_QUEUE=avg_transactions_3
      - AGGREGATION_PREFIX=local_average_3
      - AGGREGATION_AMOUNT=1
      - CONTROL_EXCHANGE=average_control_exchange
  average_aggregator_0:
    build:
      context: ./src
      dockerfile: operations/aggregators/Dockerfile
    container_name: average_aggregator_0
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
      - RABBITMQ_HOST=rabbitmq
      - ID=0
      - INPUT_EXCHANGE=local_average_3
      - OUTPUT_EXCHANGE=client_average_shards_3
      - COUNTER_AMOUNT=1
      - JOINERS_COUNT=1
  average_joiner_0:
    build:
      context: ./src
      dockerfile: operations/joiners/Dockerfile
    container_name: average_joiner_0
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
      - ID=0
      - RABBITMQ_HOST=rabbitmq
      - INPUT_EXCHANGE=client_average_shards_3
      - OUTPUT_QUEUE=calculated_averages_3
      - AGGREGATION_AMOUNT=1
  eof_tracker:
    build:
      context: ./src/
      dockerfile: tracker/Dockerfile
    container_name: eof_tracker
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - RABBITMQ_HOST=rabbitmq
      - EOF_CONTROL_QUEUE=eof_control_queue_3
      - FINAL_QUEUE=avg_transactions_3
      - TOPOLOGY=gateway,projection_dispatcher,currency_filter,date_range_filter,average_worker