services:
  gateway:
    build:
      context: ./src/
      dockerfile: gateway/Dockerfile
    container_name: gateway
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
    - INPUT_QUEUE=counted_transactions_5
    - MOM_HOST=rabbitmq
    - OUTPUT_QUEUE=transactions
    - PYTHONUNBUFFERED=1
    - SERVER_HOST=gateway
    - SERVER_PORT=5678
    - EOF_CONTROL_QUEUE=eof_control_queue_5
  client_1:
    build:
      context: ./src/
      dockerfile: client/Dockerfile
    container_name: client_1
    depends_on:
      - gateway
    environment:
    - INPUT_FILE=/datasets/HI-Small_Trans.csv
    - SERVER_HOST=gateway
    - SERVER_PORT=5678
    - OUTPUT_FILE_MINOR_RESULT=/output/client_1_minor_result.csv
    volumes:
    - ./datasets:/datasets
    - ./output:/output
