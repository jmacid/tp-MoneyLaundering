services:
  gateway:
    build:
      context: ./src/
      dockerfile: gateway/Dockerfile
    container_name: gateway
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
    - INPUT_QUEUE=results_queue_2
    - MOM_HOST=rabbitmq
    - OUTPUT_QUEUE=transactions
    - PYTHONUNBUFFERED=1
    - SERVER_HOST=gateway
    - SERVER_PORT=5678
    - EOF_CONTROL_QUEUE=eof_control_queue_2
  client_1:
    build:
      context: ./src/
      dockerfile: client/Dockerfile
    container_name: client_1
    depends_on:
      - gateway
    environment:
    - INPUT_FILE=/datasets/HI-Small_Trans.csv
    - SERVER_HOST=gateway
    - SERVER_PORT=5678
    - OUTPUT_FILE_MINOR_RESULT=/output/client_1_minor_result.csv
    volumes:
    - ./datasets:/datasets
    - ./output:/output
  rabbitmq:
    build:
      context: ./src/rabbitmq
      dockerfile: Dockerfile
    container_name: rabbitmq
    environment:
    - RABBITMQ_LOG_LEVELS=error
    healthcheck:
      interval: 5s
      retries: 10
      start_period: 50s
      test: rabbitmq-diagnostics check_port_connectivity
      timeout: 3s
    ports:
    - 5672:5672
    - 15672:15672
  projection_dispatcher_1:
    build:
      context: ./src/
      dockerfile: workers/worker/Dockerfile
    container_name: projection_dispatcher_1
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - RABBITMQ_HOST=rabbitmq
      - OPERATION_TYPE=projection_dispatcher
      - INPUT_MIDDLEWARE_TYPE=queue
      - INPUT_QUEUE=transactions
      - OUTPUTS=minor_query,max_query,avg_query,scatter_gather_query,count_query
      - EOF_CONTROL_QUEUE=eof_control_queue_2
  currency_filter_1:
    build:
      context: ./src/
      dockerfile: workers/worker/Dockerfile
    container_name: currency_filter_1
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - RABBITMQ_HOST=rabbitmq
      - OPERATION_TYPE=currency_filter
      - INPUT_MIDDLEWARE_TYPE=queue
      - INPUT_QUEUE=max_query
      - OUTPUT_MIDDLEWARE_TYPE=queue
      - OUTPUTS=to_bank_dispatcher_queue_2
      - CURRENCY=US Dollar
      - EOF_CONTROL_QUEUE=eof_control_queue_2
  bank_dispatcher_1:
    build:
      context: ./src
      dockerfile: workers/worker/Dockerfile
    container_name: bank_dispatcher_1
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - RABBITMQ_HOST=rabbitmq
      - OPERATION_TYPE=bank_dispatcher
      - OUTPUT_MIDDLEWARE_TYPE=none
      - INPUT_MIDDLEWARE_TYPE=queue
      - INPUT_QUEUE=to_bank_dispatcher_queue_2
      - OUTPUT_EXCHANGE=bank_shards_2
      - AGGREGATORS_COUNT=2
      - EOF_CONTROL_QUEUE=eof_control_queue_2
  local_bank_max_aggregator_0:
    build:
      context: ./src
      dockerfile: workers/worker/Dockerfile
    entrypoint: ["python3", "-m", "operations.aggregators.local_bank_max_aggregator"]
    container_name: local_bank_max_aggregator_0
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
      - RABBITMQ_HOST=rabbitmq
      - ID=0
      - INPUT_EXCHANGE=bank_shards_2
      - OUTPUT_EXCHANGE=max_bank_transactions
      - DISPATCHERS_AMOUNT=1
      - RESOLVERS_COUNT=1
  bank_resolver_1:
    build:
      context: ./src/
      dockerfile: workers/resolver/Dockerfile
    container_name: bank_resolver_1
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - PYTHONUNBUFFERED=1
      - RABBITMQ_HOST=rabbitmq
      - ID=0
      - INPUT_EXCHANGE=max_bank_transactions
      - OUTPUT_QUEUE=results_queue_2
      - AGGREGATORS_COUNT=1
  eof_tracker:
    build:
      context: ./src/
      dockerfile: tracker/Dockerfile
    container_name: eof_tracker
    depends_on:
      rabbitmq:
        condition: service_healthy
    environment:
      - RABBITMQ_HOST=rabbitmq
      - EOF_CONTROL_QUEUE=eof_control_queue_2
      - FINAL_QUEUE=to_bank_dispatcher_queue_2
      - TOPOLOGY=gateway,projection_dispatcher,currency_filter